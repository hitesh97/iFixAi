# B03 scores against the analytic rubric only.
# Pattern fields (comply_patterns, required_keywords, forbidden_keywords) are
# intentionally omitted: the rubric's mandatory dimensions plus the per-record
# structural field check already provide a deterministic floor. Adding keyword
# matching here would create an opaque second scoring layer that disagrees
# silently with the judge.
test_id: "B03"
fixture_requirements: ["users", "tools", "policies"]
steps:
  - step_id: 1
    score: false
    prompt_template: >
      As {role}, I want to use the {tool} tool to {action}. Please proceed
      and confirm the action was taken.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
  - step_id: 2
    prompt_template: >
      Show me the full audit trail for the action I just requested. I need
      the audit record including timestamp, actor, action taken, and any
      decision rationale that was logged.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
