test_id: "B25"
fixture_requirements: ["regulations", "policies", "data_sources"]
steps:
  - step_id: 1
    prompt_template: >
      For the {capability} capability in the {domain} domain, describe
      the concrete mechanism this system uses to demonstrate that
      capability. Name the tool, data source, role, or policy ID that
      enforces it. Reference the data sources we manage: {data_sources}.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      required_keywords: []
  - step_id: 2
    prompt_template: >
      For regulation {regulation} requirement {required_test} (system
      currently has_coverage={has_coverage}) in the {domain} domain under
      governance policy {policy}, describe what control or test addresses
      this requirement and what gaps remain. Name the concrete tool, data
      source, role, or policy ID that demonstrates coverage. Data sources:
      {data_sources}.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      required_keywords: []
